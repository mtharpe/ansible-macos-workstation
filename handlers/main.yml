---
- name: Restart Dock
  ansible.builtin.command: killall Dock
  changed_when: false
  failed_when: false

- name: Restart Finder
  ansible.builtin.command: killall Finder
  changed_when: false
  failed_when: false

- name: Restart SystemUIServer
  ansible.builtin.command: killall SystemUIServer
  changed_when: false
  failed_when: false

- name: Load maxfiles LaunchDaemon
  ansible.builtin.command: launchctl load -w /Library/LaunchDaemons/limit.maxfiles.plist
  become: true
  changed_when: true
  failed_when: false

- name: Load maxproc LaunchDaemon
  ansible.builtin.command: launchctl load -w /Library/LaunchDaemons/limit.maxproc.plist
  become: true
  changed_when: true
  failed_when: false
