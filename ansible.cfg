# config file for ansible -- http://ansible.com/
# ==============================================
# See https://github.com/ansible/ansible/blob/devel/examples/ansible.cfg
# for an example ansible.cfg

[defaults]
host_key_checking = False
retry_files_enabled = False
inventory = inventory
roles_path = ./roles
stdout_callback = default
callbacks_enabled = timer, profile_tasks
result_format = yaml
deprecation_warnings = False
inject_facts_as_vars = False
# `ansible_managed` is no longer set here — DEFAULT_MANAGED_STR is deprecated
# (slated for removal in ansible-core 2.23). It's now defined as a regular
# variable in vars/vars.yml so templates can keep using `{{ ansible_managed }}`.

[ssh_connection]
control_path = ~/.ssh/ansible-%%r@%%h:%%p
scp_if_ssh = True
pipelining = True

[privilege_escalation]
become_ask_pass = True
