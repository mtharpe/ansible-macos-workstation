---
- name: Ensure LXC config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/lxc"
    state: directory
    mode: '0750'

- name: Template LXC client config
  ansible.builtin.template:
    src: lxc-config.yml.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/lxc/config.yml"
    mode: '0644'
