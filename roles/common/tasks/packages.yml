---
- name: Add Homebrew taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_taps | default([]) }}"

# Run `brew update` every play but never report it as a change — `brew
# update` reports changed whenever any tap fetches new formula info,
# which would make the play non-idempotent on its own.
- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true
  changed_when: false

- name: Install Homebrew formulae
  community.general.homebrew:
    name: "{{ homebrew_formulae }}"
    state: present

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name: "{{ homebrew_casks }}"
    state: present
    accept_external_apps: true

- name: Run brew cleanup
  ansible.builtin.command: brew cleanup
  changed_when: false
