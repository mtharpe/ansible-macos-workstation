---
# All macOS settings are gated on Darwin so converging on a Linux
# container is a no-op for this role.
- name: Apply macOS global defaults
  ansible.builtin.import_tasks: defaults.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_defaults | default(true)

- name: Apply Finder settings
  ansible.builtin.import_tasks: finder.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_finder | default(true)

- name: Apply Dock settings + layout
  ansible.builtin.import_tasks: dock.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_dock | default(true)

- name: Apply menu bar settings
  ansible.builtin.import_tasks: menubar.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_menubar | default(true)

- name: Apply keyboard settings
  ansible.builtin.import_tasks: keyboard.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_keyboard | default(true)

- name: Apply trackpad settings
  ansible.builtin.import_tasks: trackpad.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_trackpad | default(true)

- name: Apply screenshot settings
  ansible.builtin.import_tasks: screenshots.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_screenshots | default(true)

- name: Apply system performance limits
  ansible.builtin.import_tasks: performance.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_performance | default(true)
    - not is_container | default(false)

- name: Trim UI animations
  ansible.builtin.import_tasks: animations.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_animations | default(true)

- name: Apply power / hibernation tuning
  ansible.builtin.import_tasks: power.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_power | default(true)
    - not is_container | default(false)

- name: Apply Spotlight excludes
  ansible.builtin.import_tasks: spotlight.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_macos_spotlight | default(true)

- name: Pin Colima VM resources
  ansible.builtin.import_tasks: colima.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - not is_container | default(false)

- name: Apply Chrome managed policies
  ansible.builtin.import_tasks: chrome.yml
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - configure_chrome_policies | default(true)
    - install_chrome | default(false)
    - not is_container | default(false)
