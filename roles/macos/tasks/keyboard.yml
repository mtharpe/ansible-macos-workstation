---
- name: Disable press-and-hold for keys in favor of key repeat
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: "{{ not macos_enable_key_repeat }}"
    state: present

# macOS stores KeyRepeat / InitialKeyRepeat as floats once the
# Keyboard pane has been opened, even though the values are whole
# numbers. Write as float to match the existing type.
- name: Set key repeat rate
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: float
    value: "{{ macos_key_repeat_rate }}"
    state: present

- name: Set initial key repeat delay
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: float
    value: "{{ macos_initial_key_repeat }}"
    state: present
