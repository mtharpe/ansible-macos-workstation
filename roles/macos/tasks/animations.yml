---
# Reduce window/dock animation durations. Keeps animations enabled
# (so the UI doesn't feel broken) but trims the lag they add to
# every interaction.
- name: Speed up window resize animation
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSWindowResizeTime
    type: float
    value: 0.001
    state: present

- name: Disable automatic window animations
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticWindowAnimationsEnabled
    type: bool
    value: false
    state: present

- name: Speed up Mission Control animation
  community.general.osx_defaults:
    domain: com.apple.dock
    key: expose-animation-duration
    type: float
    value: 0.1
    state: present
  notify: Restart Dock

- name: Disable Dock launch bounce animation
  community.general.osx_defaults:
    domain: com.apple.dock
    key: launchanim
    type: bool
    value: false
    state: present
  notify: Restart Dock
